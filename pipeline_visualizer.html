<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Backend Pipeline Visualizer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .stage-output { max-height: 0; overflow: hidden; transition: max-height 0.38s ease, opacity 0.3s ease; opacity: 0; }
    .stage-output.open { max-height: 9000px; opacity: 1; }
    .connector { display: flex; flex-direction: column; align-items: center; height: 32px; gap: 0; }
    .connector .line { width: 2px; flex: 1; background: #cbd5e1; }
    .connector .arrowhead { color: #94a3b8; font-size: 10px; line-height: 1; }
    .nav-btn.active { background: #eef2ff !important; color: #4338ca !important; font-weight: 600; }
    .tag-af  { background: #dbeafe; color: #1d4ed8; }
    .tag-fk  { background: #dcfce7; color: #15803d; }
    .tag-csn { background: #ffedd5; color: #c2410c; }
    .tag-all { background: #f3e8ff; color: #7e22ce; }
    .flow-arrow::after { content: "→"; position: absolute; right: -16px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 1.1rem; }
    .flow-arrow { position: relative; }
    pre { white-space: pre-wrap; word-break: break-word; }

    .trace-output { display:none; }
.trace-output.open { display:block; }
.trace-tab.active { background:#2563eb; color:white; }
.score-bar { height: 8px; border-radius: 999px; background:#e2e8f0; overflow:hidden; }
.score-bar > div { height:100%; background:#2563eb; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

<!-- Header -->
<header class="bg-white border-b border-slate-200 px-8 py-4 flex items-center justify-between sticky top-0 z-10 shadow-sm">
  <div>
    <h1 class="text-xl font-bold text-slate-900">Backend Pipeline Visualizer</h1>
    <p class="text-xs text-slate-400 mt-0.5">Income ontology · AF + FK + CSN · Jane Doe (20000421-1234)</p>
  </div>
  <a href="http://localhost:8000/docs" target="_blank"
     class="text-xs bg-rose-50 text-rose-600 border border-rose-200 rounded px-3 py-1.5 hover:bg-rose-100 transition">
    API docs ↗
  </a>
</header>

<!-- Pipeline flow bar -->
<section class="bg-white border-b border-slate-200 px-8 py-5">
  <p class="text-xs uppercase tracking-widest text-slate-400 mb-4">Full pipeline</p>
  <div class="flex items-center gap-9 overflow-x-auto pb-1">
    <div class="flow-arrow flex-shrink-0 text-center">
      <div class="bg-indigo-600 text-white rounded-lg px-3 py-2.5 text-xs font-bold shadow-sm">① Ontology</div>
      <div class="text-xs text-slate-400 mt-1">income_ontology.ttl</div>
    </div>
    <div class="flow-arrow flex-shrink-0 text-center">
      <div class="bg-violet-600 text-white rounded-lg px-3 py-2.5 text-xs font-bold shadow-sm">② Model</div>
      <div class="text-xs text-slate-400 mt-1">src/models/</div>
    </div>
    <div class="flow-arrow flex-shrink-0 text-center">
      <div class="bg-blue-600 text-white rounded-lg px-3 py-2.5 text-xs font-bold shadow-sm">③ Reasoner</div>
      <div class="text-xs text-slate-400 mt-1">src/reasoner/</div>
    </div>
    <div class="flow-arrow flex-shrink-0 text-center">
      <div class="bg-amber-500 text-white rounded-lg px-3 py-2.5 text-xs font-bold shadow-sm">④ Mapping</div>
      <div class="text-xs text-slate-400 mt-1">src/mappings/</div>
    </div>
    <div class="flow-arrow flex-shrink-0 text-center">
      <div class="bg-teal-600 text-white rounded-lg px-3 py-2.5 text-xs font-bold shadow-sm">⑤ Transform</div>
      <div class="text-xs text-slate-400 mt-1">src/transform/</div>
    </div>
    <div class="flex-shrink-0 text-center">
      <div class="bg-emerald-600 text-white rounded-lg px-3 py-2.5 text-xs font-bold shadow-sm">⑥ Result</div>
      <div class="text-xs text-slate-400 mt-1">interpretation</div>
    </div>
  </div>
</section>

<!-- Main -->
<main class="flex">
  <!-- Sidebar -->
  <aside class="w-52 flex-shrink-0 bg-white border-r border-slate-200 pt-4" style="min-height:calc(100vh - 144px)">
    <p class="text-xs uppercase tracking-widest text-slate-400 px-4 mb-2">Concepts</p>
    <div id="concept-nav" class="flex flex-col gap-0.5 px-2"></div>
    <p class="text-xs uppercase tracking-widest text-slate-400 px-4 mt-6 mb-2">Sources</p>
    <div class="px-2">
      <button class="nav-btn w-full text-left text-sm px-3 py-2 rounded-md text-slate-600 hover:bg-slate-100 transition" data-section="sources" onclick="selectSources()">All 12 CSV files</button>
    </div>
    <p class="text-xs uppercase tracking-widest text-slate-400 px-4 mt-6 mb-2">API</p>
    <div class="px-2">
      <button class="nav-btn w-full text-left text-sm px-3 py-2 rounded-md text-slate-600 hover:bg-slate-100 transition" data-section="api" onclick="selectAPI()">/api/test-pipeline</button>
    </div>
  </aside>

  <!-- Detail panel -->
  <div class="flex-1 p-8 overflow-auto" style="min-height:calc(100vh - 144px)">
    <div id="detail-panel"></div>
  </div>
</main>

const STAGE_ORDER = ['ontology', 'model', 'reasoner', 'mapping', 'transform', 'result'];

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fileAuthority(f) {
  if (f.startsWith('af_')) return 'AF';
  if (f.startsWith('fk_')) return 'FK';
  if (f.startsWith('csn_')) return 'CSN';
  return null;
}

function authorityBadge(auth) {
  const cls = { AF:'tag-af', FK:'tag-fk', CSN:'tag-csn' }[auth] || 'tag-all';
  return `<span class="inline-block text-xs font-semibold px-1.5 py-0.5 rounded ${cls} mr-1">${auth}</span>`;
}

function renderOutput(stage, conceptName) {
  switch (stage.outputType) {
    case 'json':
      return `<pre class="rounded-lg p-4 text-xs font-mono leading-relaxed overflow-x-auto" style="background:#1e293b;color:#86efac">${esc(JSON.stringify(stage.output, null, 2))}</pre>`;
    case 'code':
      return `<pre class="rounded-lg p-4 text-xs font-mono leading-relaxed overflow-x-auto" style="background:#1e293b;color:#93c5fd">${esc(stage.output)}</pre>`;
    case 'table': {
      const hdr = stage.output.headers.map(h =>
        `<th class="text-left pb-2 pr-4 text-xs font-semibold text-slate-500 uppercase tracking-wider border-b border-slate-200 whitespace-nowrap">${h}</th>`
      ).join('');
      const rows = stage.output.rows.map(row => {
        const cells = row.map((cell, i) => {
          let content = esc(cell);
          if (i === 0) {
            const auth = fileAuthority(cell.split(' ')[0]);
            if (auth) content = authorityBadge(auth) + `<span class="font-mono text-xs">${esc(cell)}</span>`;
          }
          if (typeof cell === 'string' && cell.startsWith('✓')) {
            content = `<span class="text-emerald-600 font-medium">${esc(cell)}</span>`;
          }
          if (typeof cell === 'string' && cell.startsWith('→')) {
            content = `<span class="text-amber-700 font-semibold">${esc(cell)}</span>`;
          }
          return `<td class="py-2.5 pr-4 text-sm text-slate-700 align-top">${content}</td>`;
        }).join('');
        return `<tr class="border-b border-slate-50 hover:bg-white transition">${cells}</tr>`;
      }).join('');
      return `<div class="overflow-x-auto"><table class="w-full"><thead><tr>${hdr}</tr></thead><tbody>${rows}</tbody></table></div>`;
    }

    case 'reasoningTrace':
  return renderReasoningTrace(stage.output, conceptName);

    case 'prose':
      return `<div class="rounded-xl p-5 border border-emerald-200 bg-white">
        <p class="text-xs font-semibold uppercase tracking-widest text-emerald-600 mb-3">Interpretation — Jane Doe (20000421-1234)</p>
        <p class="text-sm leading-relaxed text-slate-700">${esc(stage.output)}</p>
      </div>`;
  }
}

  function renderReasoningTrace(trace, conceptName) {
  return `
    <div class="space-y-5">
      ${renderTraceSummary(trace.summary)}

      <div class="flex flex-wrap gap-2">
        <button class="trace-tab active text-xs font-semibold px-3 py-1.5 rounded-lg border border-blue-200" onclick="selectTraceTab('${conceptName}', 'overview', this)">Overview</button>
        <button class="trace-tab text-xs font-semibold px-3 py-1.5 rounded-lg border border-blue-200 bg-white text-blue-700" onclick="selectTraceTab('${conceptName}', 'fields', this)">Field-level reasoning</button>
        <button class="trace-tab text-xs font-semibold px-3 py-1.5 rounded-lg border border-blue-200 bg-white text-blue-700" onclick="selectTraceTab('${conceptName}', 'pairs', this)">Period pairing</button>
      </div>

      <div id="trace-${conceptName}-overview" class="trace-output open">
        ${renderTraceOverview(trace)}
      </div>
      <div id="trace-${conceptName}-fields" class="trace-output">
        ${trace.fields.map(renderFieldTraceCard).join('')}
      </div>
      <div id="trace-${conceptName}-pairs" class="trace-output">
        ${renderPeriodPairs(trace.period_pairs)}
      </div>
    </div>
  `;
}

function renderTraceSummary(summary) {
  const stats = [
    ['Inspected columns', summary.inspected_columns],
    ['Accepted fields', summary.accepted_time_fields],
    ['Rejected fields', summary.rejected_fields],
    ['Period pairs', summary.period_pairs],
    ['Threshold', summary.threshold],
  ];

  return `<div class="grid grid-cols-5 gap-3">${stats.map(([label, value]) => `
    <div class="bg-white border border-blue-100 rounded-xl p-3">
      <p class="text-[10px] uppercase tracking-widest text-slate-400">${esc(label)}</p>
      <p class="text-lg font-bold text-slate-800 mt-1">${esc(value)}</p>
    </div>`).join('')}</div>`;
}

function renderTraceOverview(trace) {
  const accepted = trace.fields.filter(f => f.target_concept);
  const rejected = trace.fields.filter(f => !f.target_concept);

  return `
    <div class="grid grid-cols-2 gap-4">
      <div class="bg-white border border-emerald-100 rounded-xl p-4">
        <p class="text-xs font-semibold uppercase tracking-widest text-emerald-600 mb-3">Accepted fields</p>
        <div class="space-y-2">${accepted.map(renderMiniFieldRow).join('')}</div>
      </div>
      <div class="bg-white border border-rose-100 rounded-xl p-4">
        <p class="text-xs font-semibold uppercase tracking-widest text-rose-600 mb-3">Rejected fields</p>
        <div class="space-y-2">${rejected.map(renderMiniFieldRow).join('')}</div>
      </div>
    </div>`;
}

function renderMiniFieldRow(field) {
  const auth = fileAuthority(field.source_file);
  return `<div class="flex items-center justify-between gap-3 border border-slate-100 rounded-lg px-3 py-2">
    <div class="min-w-0">
      <p class="font-mono text-xs font-semibold text-slate-700 truncate">${esc(field.source_field)}</p>
      <p class="text-[11px] text-slate-400 truncate">${auth ? authorityBadge(auth) : ''}${esc(field.source_file)}</p>
    </div>
    <div class="text-right flex-shrink-0">
      <p class="text-xs font-bold ${field.target_concept ? 'text-emerald-600' : 'text-rose-600'}">${esc(field.final_score)}</p>
      <p class="text-[10px] text-slate-400">score</p>
    </div>
  </div>`;
}

function renderFieldTraceCard(field) {
  const accepted = Boolean(field.target_concept);
  const percent = Math.min(100, Math.round(field.final_score * 100));
  const auth = fileAuthority(field.source_file);

  return `
    <div class="bg-white border ${accepted ? 'border-emerald-100' : 'border-rose-100'} rounded-xl p-4 mb-4">
      <div class="flex justify-between items-start gap-4 mb-4">
        <div class="min-w-0">
          <div class="flex flex-wrap items-center gap-2">
            ${auth ? authorityBadge(auth) : ''}
            <p class="font-mono text-sm font-semibold text-slate-800">${esc(field.source_field)}</p>
            <span class="text-xs text-slate-400">${esc(field.source_file)}</span>
          </div>
          <p class="text-xs text-slate-400 mt-1">Sample values: <span class="font-mono">${field.sample_values.map(esc).join(', ')}</span></p>
        </div>
        <span class="text-xs font-bold px-2 py-1 rounded ${accepted ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}">${esc(field.decision)}</span>
      </div>

      <div class="mb-4">
        <div class="flex justify-between text-xs text-slate-500 mb-1">
          <span>Confidence score</span>
          <span class="font-semibold text-slate-700">${esc(field.final_score)} / threshold 0.6</span>
        </div>
        <div class="score-bar"><div style="width:${percent}%"></div></div>
      </div>

      <div class="space-y-2">
        ${field.checks.map(renderCheckRow).join('')}
      </div>
    </div>`;
}

function renderCheckRow(check) {
  const scoreClass =
    check.score_delta > 0
      ? 'text-emerald-700 bg-emerald-50 border-emerald-100'
      : check.score_delta < 0
        ? 'text-rose-700 bg-rose-50 border-rose-100'
        : 'text-slate-500 bg-slate-50 border-slate-100';

  return `<div class="flex items-start gap-3 border-l-2 ${check.matched ? 'border-blue-300' : 'border-slate-200'} pl-3 py-2">
    <span class="mt-0.5 text-xs font-bold ${check.matched ? 'text-blue-600' : 'text-slate-400'}">${check.matched ? '✓' : '—'}</span>
    <div class="flex-1 min-w-0">
      <div class="flex flex-wrap items-center gap-2">
        <p class="text-xs font-semibold text-slate-700">${esc(check.step)}</p>
        <span class="text-[11px] font-semibold px-1.5 py-0.5 rounded border ${scoreClass}">${check.score_delta > 0 ? '+' : ''}${esc(check.score_delta)}</span>
      </div>
      <p class="text-xs text-slate-500 mt-0.5">${esc(check.explanation)}</p>
      ${check.matches && check.matches.length ? `<p class="text-xs font-mono text-indigo-600 mt-1">Matched: ${check.matches.map(esc).join(', ')}</p>` : ''}
    </div>
  </div>`;
}

function renderPeriodPairs(pairs) {
  return `<div class="space-y-3">${pairs.map(pair => `
    <div class="bg-white border border-blue-100 rounded-xl p-4">
      <div class="flex flex-wrap items-center gap-2 mb-2">
        ${authorityBadge(fileAuthority(pair.source_file))}
        <span class="font-mono text-xs text-slate-500">${esc(pair.source_file)}</span>
      </div>
      <div class="flex items-center gap-3 mb-2">
        <span class="bg-emerald-50 text-emerald-700 border border-emerald-100 rounded-lg px-2 py-1 text-xs font-mono">${esc(pair.start_field)}</span>
        <span class="text-slate-400">→</span>
        <span class="bg-amber-50 text-amber-700 border border-amber-100 rounded-lg px-2 py-1 text-xs font-mono">${esc(pair.end_field)}</span>
        <span class="ml-auto text-xs font-bold text-blue-700">confidence ${esc(pair.confidence)}</span>
      </div>
      <p class="text-xs text-slate-500 leading-relaxed">${esc(pair.reason)}</p>
    </div>`).join('')}</div>`;
}

function selectTraceTab(conceptName, tab, clickedButton) {
  document.querySelectorAll(`[id^="trace-${conceptName}-"]`).forEach(el => el.classList.remove('open'));
  document.getElementById(`trace-${conceptName}-${tab}`).classList.add('open');

  clickedButton.parentElement.querySelectorAll('.trace-tab').forEach(btn => {
    btn.classList.remove('active');
    btn.classList.add('bg-white', 'text-blue-700');
  });

  clickedButton.classList.add('active');
  clickedButton.classList.remove('bg-white', 'text-blue-700');
}


// ── INTERACTIONS ──────────────────────────────────────────────────────────────

function toggleStage(conceptName, stageKey) {
  const outputEl = document.getElementById(`out-${conceptName}-${stageKey}`);
  const btnEl    = document.getElementById(`btn-${conceptName}-${stageKey}`);
  if (!outputEl || !btnEl) return;

  if (outputEl.classList.contains('open')) {
    outputEl.classList.remove('open');
    btnEl.textContent = '▶ Run';
    btnEl.disabled = false;
    return;
  }

  btnEl.textContent = 'Running…';
  btnEl.disabled = true;
  setTimeout(() => {
    outputEl.classList.add('open');
    btnEl.textContent = '▲ Hide';
    btnEl.disabled = false;
  }, 380);
}

async function runAll(conceptName) {
  for (const stageKey of STAGE_ORDER) {
    const outputEl = document.getElementById(`out-${conceptName}-${stageKey}`);
    const btnEl    = document.getElementById(`btn-${conceptName}-${stageKey}`);
    if (!outputEl || outputEl.classList.contains('open')) continue;
    btnEl.textContent = 'Running…'; btnEl.disabled = true;
    await new Promise(r => setTimeout(r, 200));
    outputEl.classList.add('open');
    btnEl.textContent = '▲ Hide'; btnEl.disabled = false;
    await new Promise(r => setTimeout(r, 120));
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────

let currentSection = null;

function updateNav() {
  document.querySelectorAll('.nav-btn').forEach(btn => {
    const active = btn.dataset.concept === currentSection || btn.dataset.section === currentSection;
    btn.className = `nav-btn w-full text-left text-sm px-3 py-2 rounded-md transition ${active ? 'active' : 'text-slate-600 hover:bg-slate-100'}`;
  });
}

function selectConcept(name) {
  currentSection = name;
  updateNav();
  const concept = PIPELINE[name];

  const stagesHtml = STAGE_ORDER.map((stageKey, idx) => {
    const stage = concept.stages[stageKey];
    const s = STAGE_STYLES[stageKey];
    const isLast = idx === STAGE_ORDER.length - 1;
    const outputHtml = renderOutput(stage, name);

    const stageCard = `
      <div class="${s.bg} border ${s.border} rounded-xl overflow-hidden">
        <div class="flex items-start justify-between gap-4 p-4">
          <div class="flex items-start gap-3 min-w-0">
            <span class="flex-shrink-0 w-7 h-7 rounded-full ${s.badge} flex items-center justify-center text-xs font-bold mt-0.5">${idx+1}</span>
            <div class="min-w-0">
              <div class="flex flex-wrap items-center gap-2">
                <span class="font-semibold text-slate-800">${stage.label}</span>
                ${stage.file ? `<span class="text-xs font-mono text-slate-400 truncate">${stage.file}</span>` : ''}
              </div>
              <p class="text-xs text-slate-500 mt-0.5 leading-relaxed">${stage.description}</p>
            </div>
          </div>
          <button id="btn-${name}-${stageKey}"
            onclick="toggleStage('${name}','${stageKey}')"
            class="${s.btn} flex-shrink-0 text-xs font-semibold px-4 py-2 rounded-lg transition">
            ▶ Run
          </button>
        </div>
        <div id="out-${name}-${stageKey}" class="stage-output">
          <div class="border-t ${s.divider} p-4">${outputHtml}</div>
        </div>
      </div>
    `;

    const connector = isLast ? '' : `<div class="connector"><div class="line"></div><div class="arrowhead">▼</div><div class="line"></div></div>`;
    return stageCard + connector;
  }).join('');

  document.getElementById('detail-panel').innerHTML = `
    <div class="max-w-3xl">
      <div class="flex items-start justify-between gap-4 mb-6">
        <div>
          <h2 class="text-2xl font-bold text-slate-900">${name}</h2>
          <p class="text-xs font-mono text-slate-400 mt-1">${concept.ontologyIRI}</p>
          <p class="text-sm text-slate-600 mt-2 max-w-xl leading-relaxed">${concept.description}</p>
        </div>
        <button onclick="runAll('${name}')"
          class="flex-shrink-0 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-4 py-2.5 rounded-xl transition shadow-sm">
          ▶▶ Run all
        </button>
      </div>
      ${stagesHtml}
    </div>
  `;
}

function selectSources() {
  currentSection = 'sources';
  updateNav();
  const byAuth = { AF: [], FK: [], CSN: [] };
  SOURCES.forEach(s => byAuth[s.authority].push(s));
  const authColors = { AF: 'bg-blue-50 border-blue-200', FK: 'bg-green-50 border-green-200', CSN: 'bg-orange-50 border-orange-200' };

  const html = Object.entries(byAuth).map(([auth, files]) => `
    <div class="mb-6">
      <h3 class="text-xs font-semibold uppercase tracking-widest text-slate-400 mb-3">${auth} — ${files.length} files</h3>
      <div class="grid grid-cols-2 gap-3">
        ${files.map(f => `<div class="${authColors[auth]} border rounded-lg p-4">
          <p class="text-sm font-mono font-semibold text-slate-700 mb-1">${f.file}</p>
          <p class="text-xs text-slate-500">${f.description}</p>
        </div>`).join('')}
      </div>
    </div>
  `).join('');

  document.getElementById('detail-panel').innerHTML = `
    <div class="max-w-3xl">
      <h2 class="text-2xl font-bold text-slate-900 mb-2">Source Files</h2>
      <p class="text-sm text-slate-500 mb-6">All synthetic SSBTEK CSVs in <span class="font-mono bg-slate-100 px-1.5 py-0.5 rounded text-xs">mapping_copilot/data/raw/</span>. All share a <span class="font-mono bg-slate-100 px-1.5 py-0.5 rounded text-xs">personal_id</span> column for cross-authority linking.</p>
      ${html}
    </div>`;
}

function selectAPI() {
  currentSection = 'api';
  updateNav();
  document.getElementById('detail-panel').innerHTML = `
    <div class="max-w-2xl">
      <h2 class="text-2xl font-bold text-slate-900 mb-2">API</h2>
      <p class="text-sm text-slate-500 mb-6">Start with: <span class="font-mono bg-slate-100 px-1.5 py-0.5 rounded text-xs">uvicorn api:app --reload</span></p>

      <div class="space-y-4 mb-8">
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="flex items-center gap-3 mb-2">
            <span class="bg-emerald-100 text-emerald-700 text-xs font-bold px-2 py-1 rounded">GET</span>
            <span class="font-mono text-sm text-slate-700">/</span>
          </div>
          <pre class="bg-slate-50 border border-slate-200 rounded p-3 text-xs font-mono text-slate-600">{ "status": "API is running" }</pre>
        </div>

        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="flex items-center gap-3 mb-3">
            <span class="bg-blue-100 text-blue-700 text-xs font-bold px-2 py-1 rounded">POST</span>
            <span class="font-mono text-sm text-slate-700">/api/test-pipeline</span>
          </div>
          <div class="grid grid-cols-2 gap-4 mb-3">
            <div>
              <p class="text-xs font-semibold text-slate-500 mb-1.5">Request</p>
              <pre class="bg-slate-50 border border-slate-200 rounded p-3 text-xs font-mono text-slate-600">{ "category": "income" }</pre>
            </div>
            <div>
              <p class="text-xs font-semibold text-slate-500 mb-1.5">Response</p>
              <pre class="bg-slate-50 border border-slate-200 rounded p-3 text-xs font-mono text-slate-600">{
  "output": {
    "category": "income",
    "person_id": "20000421-1234",
    "support_type": [...]
  }
}</pre>
            </div>
          </div>
          <p class="text-xs text-slate-500">Runs <code class="bg-slate-100 px-1 rounded">transform_support_type("20000421-1234")</code> and returns all matched SupportType instances for Jane from the synthetic CSV data.</p>
        </div>
      </div>

      <div class="bg-white border border-slate-200 rounded-xl p-5">
        <h3 class="text-sm font-semibold text-slate-700 mb-4">Live test <span class="text-xs font-normal text-slate-400">(API must be running on localhost:8000)</span></h3>
        <div class="flex gap-2 mb-4">
          <input id="api-input" type="text" value="income"
            class="border border-slate-200 rounded px-3 py-2 text-sm font-mono flex-1 focus:outline-none focus:ring-2 focus:ring-indigo-300"
            placeholder="category" />
          <button onclick="callAPI()"
            class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-4 py-2 rounded-lg transition">
            Send
          </button>
        </div>
        <pre id="api-result" class="bg-slate-50 border border-slate-200 rounded p-3 text-xs font-mono text-slate-600 min-h-12 whitespace-pre-wrap">— press Send to call the API —</pre>
      </div>
    </div>`;
}

async function callAPI() {
  const category = document.getElementById('api-input').value.trim();
  const resultEl = document.getElementById('api-result');
  resultEl.textContent = 'Calling localhost:8000…';
  try {
    const res = await fetch('http://localhost:8000/api/test-pipeline', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ category }),
    });
    resultEl.textContent = JSON.stringify(await res.json(), null, 2);
  } catch (err) {
    resultEl.textContent = `Error: ${err.message}\n\nMake sure the API is running:\n  uvicorn api:app --reload`;
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────

function buildNav() {
  const nav = document.getElementById('concept-nav');
  Object.keys(PIPELINE).forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn w-full text-left text-sm px-3 py-2 rounded-md text-slate-600 hover:bg-slate-100 transition';
    btn.dataset.concept = name;
    btn.textContent = name;
    btn.onclick = () => selectConcept(name);
    nav.appendChild(btn);
  });
}

buildNav();
selectConcept('SupportType');
</script>
